[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "policyflux"
version = "0.1.0"
description = "PolicyFlux: congressional dynamics simulator with a compile/run workflow"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
license-files = ["LICENSE"]
keywords = ["congress", "simulation", "rl", "dbn", "politics"]
dependencies = [
    "numpy>=1.24",
    "pandas>=1.5",
    "networkx>=3.0",
    "scikit-learn>=1.3",
    "joblib>=1.2",
    "torch>=2.2",
    "pyvoteview>=2.2",
    "requests>=2.31",
    "tqdm>=4.65",
    "matplotlib>=3.7",
    "python-louvain>=0.16",
    "hmmlearn>=0.3.2",
]

[project.optional-dependencies]
gpu = [
    "cupy>=13.0.0",
    "cuml>=24.6.0",
]
dev = [
    "pytest>=7.4",
]

[project.scripts]
policyflux = "policyflux.cli:main"

[tool.setuptools]
package-dir = {"" = "."}
include-package-data = true

[tool.setuptools.packages.find]
include = [
    "behavioral_sim*",
    "congress*",
    "data_collectors*",
    "engine*",
    "models*",
    "public_opinion*",
    "policyflux*",
]
exclude = ["tests*", "cache*", "results*", "scripts*", "__pycache__"]

[tool.setuptools.py-modules]
py-modules = ["config", "congress_simulator", "main", "gpu_utils", "utils", "demo_ipm_voting"]
